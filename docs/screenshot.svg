<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" font-family="Menlo,Monaco,Consolas,monospace">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#1e1e2e"/>
      <stop offset="1" stop-color="#11111b"/>
    </linearGradient>
  </defs>
  <rect width="800" height="500" rx="12" fill="url(#bg)"/>
  <!-- Title bar -->
  <rect width="800" height="32" rx="12" fill="#181825"/>
  <rect y="20" width="800" height="12" fill="#181825"/>
  <circle cx="20" cy="16" r="6" fill="#f38ba8"/>
  <circle cx="40" cy="16" r="6" fill="#f9e2af"/>
  <circle cx="60" cy="16" r="6" fill="#a6e3a1"/>
  <text x="400" y="20" text-anchor="middle" fill="#6c7086" font-size="11">MyShell — Windows Command Shell</text>
  <!-- Terminal content -->
  <text x="20" y="70" fill="#cdd6f4" font-size="14">
    <tspan fill="#a6e3a1">MyShell&gt;</tspan> help
  </text>
  <text x="20" y="95" fill="#bac2de" font-size="13">Interne Befehle:</text>
  <text x="20" y="115" fill="#bac2de" font-size="13">  exit  - Shell beenden</text>
  <text x="20" y="135" fill="#bac2de" font-size="13">  cd    - Verzeichnis anzeigen/wechseln</text>
  <text x="20" y="155" fill="#bac2de" font-size="13">  echo  - Text ausgeben</text>
  <text x="20" y="175" fill="#bac2de" font-size="13">  help  - diese Hilfe</text>
  <text x="20" y="210" fill="#cdd6f4" font-size="14">
    <tspan fill="#a6e3a1">MyShell&gt;</tspan> echo Hello, World!
  </text>
  <text x="20" y="235" fill="#bac2de" font-size="13">Hello, World!</text>
  <text x="20" y="270" fill="#cdd6f4" font-size="14">
    <tspan fill="#a6e3a1">MyShell&gt;</tspan> cd C:\Projects
  </text>
  <text x="20" y="305" fill="#cdd6f4" font-size="14">
    <tspan fill="#a6e3a1">MyShell&gt;</tspan> notepad.exe
  </text>
  <text x="20" y="330" fill="#7f849c" font-size="12">[External process launched via CreateProcessA]</text>
  <text x="20" y="365" fill="#cdd6f4" font-size="14">
    <tspan fill="#a6e3a1">MyShell&gt;</tspan> cmd /C dir
  </text>
  <text x="20" y="390" fill="#7f849c" font-size="12">[Directory listing via cmd.exe]</text>
  <text x="20" y="430" fill="#cdd6f4" font-size="14">
    <tspan fill="#a6e3a1">MyShell&gt;</tspan> <tspan>█</tspan>
  </text>
</svg>
